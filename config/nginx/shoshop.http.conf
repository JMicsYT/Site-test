# Nginx для Docker: только HTTP (без редиректа на HTTPS).
# Используйте на чистом VPS по IP, пока нет сертификата Let's Encrypt.
# В docker-compose.yml замените монтирование:
#   ./config/nginx/shoshop.http.conf:/etc/nginx/conf.d/default.conf:ro

upstream shoshop_web {
    server web:8000;
}

server {
    listen 80;
    # Не добавляйте listen [::]:80 — на VPS без IPv6 nginx не запустится.
    server_name _;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://shoshop_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
