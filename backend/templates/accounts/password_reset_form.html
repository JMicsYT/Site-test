{% extends "base.html" %}

{% block title %}Сброс пароля — ShoShop{% endblock %}

{% block content %}
<section class="section auth-section">
    <div class="container auth-container">
        <div class="auth-card">
            <h1>Сброс пароля</h1>
            <p class="muted small">Введите email — мы отправим ссылку для смены пароля.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.non_field_errors }}
                <label class="field">
                    <span>Email</span>
                    {{ form.email }}
                    {{ form.email.errors }}
                </label>
                <button class="btn btn-primary btn-block" type="submit">Отправить ссылку</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
