# Подключение: docker compose -f docker-compose.yml -f docker-compose.selfsigned.yml up -d
# Перед запуском: ./scripts/ssl-selfsigned.sh  (см. config/ssl-selfsigned.env)

services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/shoshop.selfsigned.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/certs:/etc/nginx/certs:ro
