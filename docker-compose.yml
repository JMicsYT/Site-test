services:
  web:
    build: .
    command: gunicorn shoshop.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shoshop}
      POSTGRES_USER: ${POSTGRES_USER:-shoshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shoshop}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  celery:
    build: .
    command: celery -A shoshop worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A shoshop beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db
    restart: unless-stopped

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
      # 443 включите после certbot и смените конфиг на config/nginx/shoshop.conf
      # - "443:443"
    volumes:
      # HTTP без редиректа на HTTPS (работает по IP без сертификата)
      - ./config/nginx/shoshop.http.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  db_data:
  static_volume:
  media_volume:

